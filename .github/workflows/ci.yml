name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - Gradio

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Compile Python sources
        run: python -m compileall src

      - name: Enforce repository hygiene
        run: |
          set -e

          bad_data_files=$(git ls-files | grep -E '^(results/|datas/|uploads/|anpr_uploads/)' | grep -vE '\.gitkeep$' || true)
          if [ -n "$bad_data_files" ]; then
            echo "Generated/runtime artifacts must not be tracked in git:"
            echo "$bad_data_files"
            exit 1
          fi

          bad_bytecode=$(git ls-files '*.pyc' || true)
          if [ -n "$bad_bytecode" ]; then
            echo "Python bytecode files must not be tracked in git:"
            echo "$bad_bytecode"
            exit 1
          fi

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: pytest -q tests
